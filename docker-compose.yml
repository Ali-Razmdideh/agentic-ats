services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats
      POSTGRES_DB: ats
    ports:
      - "5432:5432"
    volumes:
      - ats-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats -d ats"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ats-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ats-artifacts &&
      mc version enable local/ats-artifacts || true
      "

  # Optional: bring up the Python worker that processes queued runs.
  # Requires ats:dev image to be built locally first (see Dockerfile).
  worker:
    image: ats:dev
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ATS_PG_DSN: postgresql+asyncpg://ats:ats@postgres:5432/ats
      ATS_MINIO_ENDPOINT: http://minio:9000
      ATS_MINIO_ACCESS_KEY: minioadmin
      ATS_MINIO_SECRET_KEY: minioadmin
      ATS_MINIO_BUCKET: ats-artifacts
      ATS_MINIO_REGION: us-east-1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["worker"]

volumes:
  ats-pgdata:
  ats-miniodata:
